# --- Local development config: uses H2, an in-memory database. ---
# No installation needed - data resets every time you restart the app.
# This is the profile you'll run while coding/testing on your own machine.

spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Lets Hibernate auto-create the "tasks" table based on the Task entity.
# (In a real production app you'd use migration tools like Flyway/Liquibase
# instead of this - but for learning, this is the simplest path.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enables the H2 web console at /h2-console so you can browse the database
# in your browser while the app is running locally.
spring.h2.console.enabled=true
